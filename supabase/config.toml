verify_jwt = false
import_map = "./functions/submit-booking/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/submit-booking/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/submit-booking/*.html" ]

[functions.decide-booking]
enabled = true
verify_jwt = false
import_map = "./functions/decide-booking/deno.json"
entrypoint = "./functions/decide-booking/index.ts"

